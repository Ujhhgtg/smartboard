[package]
name = "smartboard"
description = "A powerful digital whiteboard and drawing application built with Rust, winit, egui, and wgpu."
version = "0.0.1"
edition = "2024"
repository = "https://github.com/Ujhhgtg/smartboard"
license-file = "LICENSE"
readme = "README.md"
build = "build.rs"

[dependencies]
egui = { version = "0.34.1", features = ["serde"], default-features = false }
egui-wgpu = { version = "0.34.1", features = ["winit", "wayland"] }
egui-winit = { version = "0.34.1", default-features = false, features = [
    "wayland",
] }
wgpu = { version = "29.0.1", features = ["webgpu", "serde"] }
winit = { version = "0.30.12", features = [
    "wayland",
], default-features = false }
pollster = "*"
rfd = "*"
image = { version = "*", features = [
    "default-formats",
], default-features = false }
rodio = { version = "*", default-features = false, features = [
    "wav",
    "playback",
] }
serde = { version = "*", features = ["derive"] }
serde_json = "*"
dirs = "*"
egui-notify = "*"
# fontdue = "*"
ttf-parser = "*"
tray-icon = "*"

# --- security vulnerabilities ---
glib = { version = "0.22", default-features = false }
# --- end ---

[build-dependencies]
shellexpand = "*"
winres = "*"

[target.'cfg(windows)'.dependencies]
windows = { version = "*", features = ["Win32_System_Console"] }
